services:
  - type: web
    name: esign-platform
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @esign/db prisma generate && NODE_OPTIONS="--max-old-space-size=256" pnpm --filter @esign/web build && NODE_OPTIONS="--max-old-space-size=256" pnpm --filter @esign/api build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.2
      - key: DATABASE_URL
        fromDatabase:
          name: esign-postgres
          property: connectionString
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        value: https://${render.host}
      - key: API_URL
        value: https://${render.host}

  - type: pserv
    name: esign-postgres
    plan: free
    ipAllowList: []
