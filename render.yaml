services:
  - type: web
    name: esign-api
    runtime: node
    plan: free
    buildCommand: bash render-build.sh
    startCommand: pnpm --filter @esign/api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.2
      - key: NODE_OPTIONS
        value: "--max-old-space-size=320"
      - key: DATABASE_URL
        fromDatabase:
          name: esign-postgres
          property: connectionString
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: API_URL
        value: https://${render.host}

  - type: web
    name: esign-web
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm run db:generate && pnpm --filter @esign/utils build && pnpm --filter @esign/crypto build && pnpm --filter @esign/payments build && pnpm --filter @esign/db build && pnpm --filter @esign/web build
    startCommand: pnpm --filter @esign/web start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://esign-api.onrender.com
      - key: NEXTAUTH_URL
        value: https://${render.host}
      - key: NEXTAUTH_SECRET
        sync: false

  - type: pserv
    name: esign-postgres
    plan: free
    ipAllowList: []
